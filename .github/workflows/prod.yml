name: Prod CI/CD

on:
  push:
    branches: [main]

concurrency:
  group: prod-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_ENV: production

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # --- Checkout code ---
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Setup PNPM & Node ---
      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: "pnpm"

      # --- CACHES ---
      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: "**/node_modules"
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: node-modules-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: playwright-${{ runner.os }}-

      # --- Install dependencies ---
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (browsers + deps)
        run: pnpm exec playwright install --with-deps

      # --- QUALITY GATES ---
      - name: Check formatting
        run: npx prettier --check "**/*.{ts,tsx,js,jsx,json,css,scss,md}" \"!packages/db/generated/**" \"!e2e/test-results/**"

      - name: Lint
        run: pnpm lint

      # --- E2E ---
      - name: Run Playwright E2E
        run: npx playwright test --config=./e2e/playwright.config.ts

      # --- ARTIFACTS ON FAILURE ---
      - name: Upload Playwright report (HTML)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload raw test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
